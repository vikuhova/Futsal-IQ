workflows:
  ios-simulator:
    name: Futsal IQ - iOS Simulator
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      xcode: latest
    scripts:
      - name: Build SwiftUI app
        script: |
          xcodebuild \
            -project "FutsalIQ.xcodeproj" \
            -scheme "FutsalIQ" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            clean build
    artifacts:
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/Products/Debug-iphonesimulator/*.app

